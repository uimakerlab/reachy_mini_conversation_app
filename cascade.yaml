# Cascade configuration: ASR → LLM → TTS pipeline
# API keys are in .env file (OPENAI_API_KEY, DEEPGRAM_API_KEY, GEMINI_API_KEY, ELEVENLABS_API_KEY)

asr:
  provider: whisper_openai  # deepgram, whisper_openai, parakeet_mlx, parakeet_mlx_streaming

  providers:
    # ========== CLOUD PROVIDERS ==========
    whisper_openai:
      module: whisper_openai
      class: WhisperOpenAIASR
      streaming: false
      location: cloud
      requires: [OPENAI_API_KEY]
      hardware: null
      description: "OpenAI Whisper API - high quality cloud batch ASR"
      # Settings
      model: whisper-1
      # Pricing (Feb 2026): $0.006/minute = $0.0001/second
      cost_per_second: 0.0001

    deepgram:
      module: deepgram
      class: DeepgramASR
      streaming: true
      location: cloud
      requires: [DEEPGRAM_API_KEY]
      hardware: null
      description: "Deepgram Nova - real-time cloud streaming ASR"
      # Settings
      model: nova-2  # or nova-3
      language: en

    openai_realtime_asr:
      module: openai_realtime_asr
      class: OpenAIRealtimeASR
      streaming: true
      location: cloud
      requires: [OPENAI_API_KEY]
      hardware: null
      description: "OpenAI Realtime - GPT-4o streaming transcription via WebSocket"
      # Settings
      model: gpt-4o-transcribe  # or gpt-4o-mini-transcribe (faster, lower quality)
      language: en
      prompt: ""  # Optional: guide transcription style/vocabulary
      use_server_vad: true  # Enable for real-time partials during speech; both VADs can coexist

    # ========== LOCAL PROVIDERS (Apple Silicon) ==========
    parakeet_mlx:
      module: parakeet_mlx
      class: ParakeetMLXASR
      streaming: false
      location: local
      requires: []
      hardware: apple_silicon
      description: "Parakeet MLX - fast local batch ASR for Apple Silicon"
      # Settings
      model: mlx-community/parakeet-tdt-0.6b-v3
      precision: bf16  # fp32 for quality, bf16 for speed

    parakeet_mlx_streaming:
      module: parakeet_mlx_streaming
      class: ParakeetMLXStreamingASR
      streaming: true
      location: local
      requires: []
      hardware: apple_silicon
      status: wip
      description: "Parakeet MLX streaming - real-time local ASR (experimental)"
      # Settings
      model: mlx-community/parakeet-tdt-0.6b-v3
      precision: bf16
      context_size: [256, 256]  # (left, right) frames
      depth: null  # null = auto

    # ========== LOCAL PROVIDERS (CUDA/MPS) ==========
    nemotron:
      module: nemotron
      class: NemotronASR
      streaming: true
      location: local
      requires: []
      hardware: cuda_or_mps
      description: "NVIDIA Nemotron - cache-aware streaming ASR"
      # Settings
      model: nvidia/nemotron-speech-streaming-en-0.6b
      chunk_size_ms: 560  # 80, 160, 560, or 1120


llm:
  provider: gpt-5.2-chat  # openai_gpt, gemini

  providers:

    gpt-5.2-chat:
      module: openai
      class: OpenAILLM
      location: cloud
      requires: [ OPENAI_API_KEY ]
      description: "OpenAI GPT 5.2 Chat"
      # Settings
      model: gpt-5.2-chat-latest
      # Pricing (Feb 2026)
      input_cost_per_1m: 1.75
      output_cost_per_1m: 14.00

    gpt-4o-mini:
      module: openai
      class: OpenAILLM
      location: cloud
      requires: [OPENAI_API_KEY]
      description: "OpenAI GPT models"
      # Settings
      model: gpt-4o-mini
      # Pricing (Feb 2026)
      input_cost_per_1m: 0.15
      output_cost_per_1m: 0.60

    gemini:
      module: gemini
      class: GeminiLLM
      location: cloud
      requires: [GEMINI_API_KEY]
      description: "Google Gemini models"
      # Settings
      model: gemini-2.5-flash-lite
      # Pricing (Feb 2026)
      input_cost_per_1m: 0.075
      output_cost_per_1m: 0.30


tts:
  provider: tts_openai  # tts_openai, kokoro, elevenlabs
  trim_silence: true

  providers:
    tts_openai:
      module: openai
      class: OpenAITTS
      location: cloud
      requires: [OPENAI_API_KEY]
      description: "OpenAI TTS API"
      # Settings
      voice: alloy
      model: tts-1  # tts-1 or tts-1-hd
      # Pricing (Feb 2026): $15/1M chars for tts-1, $30/1M chars for tts-1-hd
      cost_per_1m_chars: 15.0

    kokoro:
      module: kokoro
      class: KokoroTTS
      location: local
      requires: []
      hardware: apple_silicon
      description: "Kokoro local TTS for Apple Silicon"
      # Settings
      voice: am_adam
      # No cost for local providers

    elevenlabs:
      module: elevenlabs
      class: ElevenLabsTTS
      location: cloud
      requires: [ELEVENLABS_API_KEY]
      description: "ElevenLabs TTS API"
      # Settings
      voice_id: pNInz6obpgDQGcFmaJgB
      model: eleven_flash_v2_5
      # Pricing (Feb 2026)
      cost_per_1m_chars: 30.0
